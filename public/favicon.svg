<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with brand border -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="#111111" stroke="#9A6B32" stroke-width="20" />
  
  <!-- Stylized Cockroach Legs and Antennae (Strokes) -->
  <g fill="none" stroke="#9A6B32" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Antennae -->
    <path d="M 242 135 C 220 70, 150 40, 90 90" stroke-width="10" />
    <path d="M 270 135 C 292 70, 362 40, 422 90" stroke-width="10" />

    <!-- Legs -->
    <!-- Front legs -->
    <path d="M 215 220 L 150 190 L 120 220" />
    <path d="M 297 220 L 362 190 L 392 220" />
    
    <!-- Middle legs -->
    <path d="M 210 270 L 130 270 L 100 310" />
    <path d="M 302 270 L 382 270 L 412 310" />
    
    <!-- Back legs -->
    <path d="M 215 320 L 140 350 L 115 420" />
    <path d="M 297 320 L 372 350 L 397 420" />

    <!-- Cerci (tail appendages) -->
    <path d="M 235 390 L 220 425" stroke-width="10" />
    <path d="M 277 390 L 292 425" stroke-width="10" />
  </g>

  <!-- Body Parts -->
  <!-- Head -->
  <path d="M 238 145 L 256 120 L 274 145 Z" fill="#9A6B32" stroke="#9A6B32" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Pronotum (Shield) -->
  <path d="M 215 170 C 215 140, 297 140, 297 170 C 297 195, 215 195, 215 170 Z" fill="#9A6B32" stroke="#111111" stroke-width="6" stroke-linejoin="round" />

  <!-- Abdomen / Wings -->
  <!-- Left Wing -->
  <path d="M 256 190 C 205 190, 195 320, 256 395 Z" fill="#9A6B32" stroke="#111111" stroke-width="6" stroke-linejoin="round" />
  <!-- Right Wing -->
  <path d="M 256 190 C 307 190, 317 320, 256 395 Z" fill="#9A6B32" stroke="#111111" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Central dividing line on wings -->
  <line x1="256" y1="190" x2="256" y2="395" stroke="#111111" stroke-width="6" stroke-linecap="round" />
</svg>
